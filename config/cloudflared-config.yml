tunnel: edf7796d-4ecc-4478-a538-0633a71b403e
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Deploy webhook — routes GitHub CI webhooks to deploy-hook service
  - hostname: papyrus-ai.net
    path: /deploy-webhook.*
    service: http://deploy-hook:9000
  # Main site routes
  - hostname: papyrus-ai.net
    service: http://caddy:80
  - hostname: "*.papyrus-ai.net"
    service: http://caddy:80
  - service: http_status:404
