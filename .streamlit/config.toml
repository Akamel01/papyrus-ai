[server]
# Maximum size of file uploads (200MB)
maxUploadSize = 200
# Maximum message size for WebSocket (200MB)
maxMessageSize = 200
# Enable XSRF protection
enableXsrfProtection = true
# Headless mode for container deployment
headless = true
# Disable file watcher — not needed in Docker, and causes hundreds of
# spurious "ModuleNotFoundError: No module named 'torchvision'" log spam
# from Streamlit trying to inspect transformers library modules for hot-reload.
fileWatcherType = "none"

[browser]
# Don't auto-open browser
gatherUsageStats = false

[theme]
primaryColor = "#FFA500"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1d26"
textColor = "#fafafa"
font = "sans serif"
base = "dark"
