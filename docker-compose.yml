x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ─── Self-Healing Mount Validator ───
  # Validates and auto-repairs file mounts before services start
  # Prevents directory-instead-of-file errors by restoring from templates
  init-validator:
    image: alpine:latest
    container_name: sme_init_validator
    deploy:
      resources:
        limits:
          memory: 128m
    volumes:
      # Parent directories with WRITE access for repair
      - ./services/caddy:/mnt/caddy:rw
      - ./config:/mnt/config:rw
      # Templates for restoration (read-only)
      - ./.templates:/mnt/templates:ro
    command: >
      sh -c '
        echo "=== Self-Healing Mount Validator ===" &&

        # --- Repair Caddyfile ---
        if [ -d /mnt/caddy/Caddyfile ]; then
          echo "REPAIRING: Caddyfile is a directory, removing and restoring..."
          rm -rf /mnt/caddy/Caddyfile
          cp /mnt/templates/Caddyfile /mnt/caddy/Caddyfile
          echo "REPAIRED: Caddyfile restored from template"
        elif [ ! -f /mnt/caddy/Caddyfile ]; then
          echo "REPAIRING: Caddyfile missing, restoring from template..."
          cp /mnt/templates/Caddyfile /mnt/caddy/Caddyfile
          echo "REPAIRED: Caddyfile created from template"
        else
          echo "OK: Caddyfile"
        fi &&

        # --- Repair config.yaml (application config) ---
        if [ -d /mnt/config/config.yaml ]; then
          echo "REPAIRING: config.yaml is a directory, removing and restoring..."
          rm -rf /mnt/config/config.yaml
          cp /mnt/templates/config.yaml.template /mnt/config/config.yaml
          echo "REPAIRED: config.yaml restored from template"
        elif [ ! -f /mnt/config/config.yaml ]; then
          echo "REPAIRING: config.yaml missing, restoring from template..."
          cp /mnt/templates/config.yaml.template /mnt/config/config.yaml
          echo "REPAIRED: config.yaml created from template"
        else
          echo "OK: config.yaml"
        fi &&

        # --- Repair cloudflared-config.yml ---
        if [ -d /mnt/config/cloudflared-config.yml ]; then
          echo "REPAIRING: cloudflared-config.yml is a directory, removing and restoring..."
          rm -rf /mnt/config/cloudflared-config.yml
          cp /mnt/templates/cloudflared-config.yml /mnt/config/cloudflared-config.yml
          echo "REPAIRED: cloudflared-config.yml restored from template"
        elif [ ! -f /mnt/config/cloudflared-config.yml ]; then
          echo "REPAIRING: cloudflared-config.yml missing, restoring from template..."
          cp /mnt/templates/cloudflared-config.yml /mnt/config/cloudflared-config.yml
          echo "REPAIRED: cloudflared-config.yml created from template"
        else
          echo "OK: cloudflared-config.yml"
        fi &&

        # --- Validate cloudflared-credentials.json (sensitive, no auto-repair) ---
        if [ -d /mnt/config/cloudflared-credentials.json ]; then
          echo "ERROR: cloudflared-credentials.json is a directory!"
          echo "FIX: rm -rf config/cloudflared-credentials.json"
          echo "Then restore your credentials file manually."
          exit 1
        elif [ ! -f /mnt/config/cloudflared-credentials.json ]; then
          echo "WARNING: cloudflared-credentials.json missing!"
          echo "Tunnel will not work. Run: cloudflared tunnel create papyrus-tunnel"
          echo "Continuing without tunnel credentials..."
        else
          echo "OK: cloudflared-credentials.json"
        fi &&

        echo "=== All mounts validated ==="
      '
    restart: "no"

  redis:
    image: redis:7.4-alpine
    container_name: sme_redis
    logging: *default-logging
    # No ports exposed — internal only
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: sme_qdrant
    logging: *default-logging
    # No ports exposed — internal only
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=2048 # Cap WAL at 2GB (prevents 50GB+ inflation)
      - QDRANT__STORAGE__WAL__WAL_SEGMENTS_AHEAD=2 # Max 2 WAL segments buffered
    deploy:
      resources:
        limits:
          memory: 32G # Hard ceiling — leaves headroom for WSL2 + other services
        reservations:
          memory: 4G # Guaranteed minimum for HNSW graph + SQ index
    stop_grace_period: 30s # Allow time for WAL flush on shutdown
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/6333) >/dev/null 2>&1'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  ollama:
    image: ollama/ollama:0.18.0
    container_name: sme_ollama
    hostname: sme_ollama_docker # Stable identity for Ollama Cloud Auth
    logging: *default-logging
    # No ports exposed — internal only
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_GPU_OVERHEAD=0
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_NUM_PARALLEL=128
      - OLLAMA_MAX_QUEUE=128
      - OLLAMA_CONTEXT_LENGTH=4096 # Must exceed chunker's max (1600 cl100k tokens ≈ 2500+ Qwen3 tokens)
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/11434) >/dev/null 2>&1'" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  app:
    build: .
    container_name: sme_app
    logging: *default-logging
    ports:
      - "8502:8501"
    volumes:
      # NO source code bind mount — code is baked into image
      - sme_db_data:/app/data # Overlay Named Volume for sme.db
      - sme_hf_model_cache:/root/.cache/huggingface # Mount Reranker HF Cache
      - ./config:/app/config:ro  # Read-only config mount
    tmpfs:
      - /tmp
      - /app/data/papers
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all # On-demand reranker access (no reservation)
      - NVIDIA_DRIVER_CAPABILITIES=all
    # GPU NOTE: Embedding routed to sme_ollama via remote_url.
    # Reranker (BAAI/bge-reranker-v2-m3, 1-2GB) loads on-demand.
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8501/chat/_stcore/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

  dashboard-backend:
    build: ./dashboard/backend
    container_name: sme_dashboard_api
    logging: *default-logging
    # No host ports — accessed only by dashboard-ui via Docker network
    volumes:
      - ./config:/config:ro  # Read-only config mount
      - sme_db_data:/data:rw # Overlay Named Volume for sme.db
      - ./src:/app/src:ro    # SME source code for document routes (read-only)
    env_file:
      - .env
    environment:
      # JWT_SECRET loaded from .env file
      - QDRANT_URL=http://sme_qdrant:6333
      - CONFIG_PATH=/config/acquisition_config.yaml
      - DB_PATH=/data/sme.db
      - CORS_ORIGINS=http://localhost:3030,http://localhost:3000,http://localhost:5173,https://papyrus-ai.net
      # Unified Auth Service configuration
      - USE_UNIFIED_AUTH=true
      - AUTH_SERVICE_URL=http://sme_auth:8000
    tmpfs:
      - /app/data/papers
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    depends_on:
      qdrant:
        condition: service_healthy
      app:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8400/health')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  dashboard-ui:
    build: ./dashboard/frontend
    container_name: sme_dashboard_ui
    logging: *default-logging
    ports:
      - "3030:3000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m
    depends_on:
      dashboard-backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  gpu-exporter:
    build: ./dashboard/gpu_exporter
    container_name: sme_gpu_exporter
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu, utility ]
    healthcheck:
      test: [ "CMD-SHELL", "nvidia-smi > /dev/null 2>&1 || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  # ─── Multi-User Auth Service ───
  auth:
    build: ./services/auth
    container_name: sme_auth
    logging: *default-logging
    volumes:
      - sme_db_data:/app/data  # Shared data volume for auth.db
    environment:
      - DATABASE_URL=sqlite:////app/data/auth.db
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # ─── Reverse Proxy (Internal Routing) ───
  caddy:
    image: caddy:2.9-alpine
    container_name: sme_caddy
    logging: *default-logging
    ports:
      - "8080:80"  # Local access port
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      init-validator:
        condition: service_completed_successfully  # Block until mounts validated
      auth:
        condition: service_healthy
      app:
        condition: service_healthy
      dashboard-ui:
        condition: service_healthy
      dashboard-backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always  # Always restart, even after Docker daemon restart

  # ─── Deploy Webhook Service (Auto-deploy on CI success) ───
  deploy-hook:
    build: ./services/deploy-hook
    container_name: sme_deploy_hook
    logging: *default-logging
    environment:
      - DEPLOY_WEBHOOK_SECRET=${DEPLOY_WEBHOOK_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/sme:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always  # Always restart, even after Docker daemon restart

  # ─── Cloudflare Tunnel (Public Access via papyrus-ai.net) ───
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sme_tunnel
    logging: *default-logging
    # Named tunnel mode: requires credentials file from 'cloudflared tunnel create'
    # Quick tunnel mode: command: tunnel --no-autoupdate --url http://caddy:80
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    volumes:
      - ./config/cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
      - ./config/cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      init-validator:
        condition: service_completed_successfully  # Block until mounts validated
      caddy:
        condition: service_healthy
    # Note: No healthcheck - cloudflared is a distroless image with no shell
    # Docker monitors the process directly via restart policy
    restart: always  # Always restart, even after Docker daemon restart

volumes:
  redis_data:
  ollama_data:
  qdrant-data:
  sme_db_data:
  sme_hf_model_cache:
  caddy_data:
  caddy_config:
