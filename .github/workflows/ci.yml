name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # STAGE 1: Code Quality
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linters
        run: |
          pip install ruff black isort mypy

      - name: Run Ruff (linting)
        run: ruff check . --output-format=github
        continue-on-error: true  # Lenient for initial setup

      - name: Run Black (formatting)
        run: black --check .
        continue-on-error: true  # Lenient for initial setup

      - name: Run isort (import sorting)
        run: isort --check-only .
        continue-on-error: true  # Lenient for initial setup

      - name: Run MyPy (type checking)
        run: mypy src/ app/ --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 2: Security Scanning
  # ═══════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r src/ app/ -ll
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 3: Unit Tests
  # ═══════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src --cov=app \
            --cov-report=xml \
            --cov-report=html \
            -v
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 4: Integration Tests
  # ═══════════════════════════════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.6
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --tb=short
        env:
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 5: Build Docker Images
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security, integration-tests]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - service: app
            context: .
            dockerfile: Dockerfile
          - service: auth
            context: ./services/auth
            dockerfile: Dockerfile
          - service: dashboard-backend
            context: ./dashboard/backend
            dockerfile: Dockerfile
          - service: dashboard-ui
            context: ./dashboard/frontend
            dockerfile: Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-${{ matrix.service }}.sarif'
        continue-on-error: true
