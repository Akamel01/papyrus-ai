name: Build Base Image

on:
  # Manual trigger with optional force rebuild
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if unchanged'
        required: false
        default: 'false'
        type: boolean

  # Rebuild when base Dockerfile changes
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.base'
      - '.github/workflows/base-image.yml'

  # Weekly rebuild to pick up security updates
  schedule:
    - cron: '0 3 * * 0'  # 3 AM UTC every Sunday

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/base

jobs:
  build-base:
    name: Build Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value=cu121-py311

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

      - name: Image size report
        run: |
          echo "Base image built and pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
