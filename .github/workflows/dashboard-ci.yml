name: CI – Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

env:
  DOCKER_BUILDKIT: 1

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: dashboard/backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests with coverage
        env:
          JWT_SECRET: ci-test-secret
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
        continue-on-error: true  # Allow tests to fail during setup phase

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          file: dashboard/backend/coverage.xml
          flags: backend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: always()  # Run even if tests fail
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sme-dashboard-backend:ci ./dashboard/backend

      - name: Build frontend image
        run: docker build -t sme-dashboard-ui:ci ./dashboard/frontend

      - name: Verify images
        run: |
          docker images | grep sme-dashboard
